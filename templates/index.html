<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizForge — Smart Learning</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .index-page {
            overflow: hidden;
        }

        .anim {
            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 0.7s ease forwards;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .anim-1 { animation-delay: 0.1s; }
        .anim-2 { animation-delay: 0.35s; }
        .anim-3 { animation-delay: 0.6s; }
        .anim-4 { animation-delay: 0.85s; }
        .anim-5 { animation-delay: 1.1s; }
        .anim-6 { animation-delay: 1.35s; }

        .logo-icon {
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
            animation-delay: 0.1s;
        }

        @keyframes popIn {
            0% {
                opacity: 0;
                transform: scale(0.5) rotate(-10deg);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotate(0deg);
            }
        }

        .enter-btn {
            position: relative;
            overflow: hidden;
        }

        .enter-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0.15);
            transform: translateX(-100%);
            transition: transform 0.4s ease;
            border-radius: 50px;
        }

        .enter-btn:hover::after {
            transform: translateX(0);
        }

        .floating {
            animation: float 3.5s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.18;
            animation: drift linear infinite;
        }

        @keyframes drift {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.18; }
            90% { opacity: 0.18; }
            100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
        }

        .index-content {
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="index-page">

        <div class="particles" id="particles"></div>

        <div class="index-content">

            <div class="logo-icon floating">
                <img src="{{ url_for('static', filename='images/logo.png') }}"
                     alt="QuizForge Logo"
                     style="width:100px; height:100px; border-radius:28px;">
            </div>

            <div class="anim anim-2">
                <div class="index-title">Quiz<span>Forge</span></div>
            </div>

            <div class="anim anim-3">
                <div class="index-tagline">
                    Transform your study material into smart quizzes
                    and beautiful flashcards — instantly.
                </div>
            </div>

            <div class="anim anim-4">
                <div class="index-badges">
                    <span class="badge">📄 PDF</span>
                    <span class="badge">🖼️ Images</span>
                    <span class="badge">📝 Word Docs</span>
                    <span class="badge">📊 PowerPoint</span>
                </div>
            </div>

            <div class="anim anim-5">
                <div style="display:flex; gap:1rem; justify-content:center; flex-wrap:wrap;">
                    <a href="{{ url_for('login') }}" class="btn btn-primary enter-btn" style="padding: 14px 44px; font-size:16px;">
                        Enter QuizForge ✦
                    </a>
                    <a href="{{ url_for('register') }}" class="btn btn-outline" style="padding: 14px 44px; font-size:16px;">
                        Create Account
                    </a>
                </div>
            </div>

            <div class="anim anim-6">
                <div style="margin-top:1rem; font-size:13px; color:#aaa;">
                    AI-powered learning • Free to use • Saves your progress
                </div>
            </div>

        </div>
    </div>

    <script>
        const colors = ['#7f77dd', '#1d9e75', '#534ab7', '#5dcaa5', '#afa9ec'];
        const container = document.getElementById('particles');

        for (let i = 0; i < 18; i++) {
            const p = document.createElement('div');
            p.classList.add('particle');
            const size = Math.random() * 18 + 8;
            p.style.width = size + 'px';
            p.style.height = size + 'px';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.background = colors[Math.floor(Math.random() * colors.length)];
            p.style.animationDuration = (Math.random() * 10 + 8) + 's';
            p.style.animationDelay = (Math.random() * 8) + 's';
            container.appendChild(p);
        }
    </script>
</body>
</html>
