<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — QuizForge</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .anim {
            opacity: 0;
            transform: translateY(24px);
            animation: fadeUp 0.6s ease forwards;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .anim-1 { animation-delay: 0.1s; }
        .anim-2 { animation-delay: 0.25s; }
        .anim-3 { animation-delay: 0.4s; }

        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.12;
            animation: drift linear infinite;
        }

        @keyframes drift {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.12; }
            90% { opacity: 0.12; }
            100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
        }

        .auth-card {
            position: relative;
            z-index: 1;
        }

        .show-pass {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 16px;
            color: #aaa;
            user-select: none;
        }

        .pass-wrap {
            position: relative;
        }

        .pass-wrap input {
            padding-right: 44px;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 1.2rem 0;
        }

        .divider hr {
            flex: 1;
            border: none;
            border-top: 1px solid #e0ddff;
        }

        .divider span {
            font-size: 12px;
            color: #bbb;
        }

        .strength-bar {
            height: 4px;
            border-radius: 50px;
            background: #e0ddff;
            margin-top: 6px;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            border-radius: 50px;
            width: 0%;
            transition: width 0.3s, background 0.3s;
        }

        .strength-text {
            font-size: 11px;
            margin-top: 4px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="page-center" style="background: linear-gradient(135deg, #f0eeff 0%, #e1f5ee 100%); min-height:100vh;">
        <div class="anim anim-1">
            <div class="auth-card">

                <div class="auth-logo anim anim-1">
                    <a href="{{ url_for('index') }}">
                        <img src="{{ url_for('static', filename='images/logo.png') }}"
                             alt="QuizForge"
                             style="width:60px; height:60px; border-radius:16px; margin-bottom:8px;">
                    </a>
                    <div class="logo-text">Quiz<span>Forge</span></div>
                    <p>Create your free account and start learning smarter.</p>
                </div>

                {% if error %}
                <div class="error-msg anim anim-2">
                    ⚠️ {{ error }}
                </div>
                {% endif %}

                <div class="anim anim-2">
                    <h2>Create your account</h2>

                    <form method="POST" action="{{ url_for('register') }}">

                        <div class="form-group">
                            <label for="name">Full name</label>
                            <input type="text"
                                   id="name"
                                   name="name"
                                   placeholder="Tanvi Sharma"
                                   required
                                   autocomplete="name">
                        </div>

                        <div class="form-group">
                            <label for="email">Email address</label>
                            <input type="email"
                                   id="email"
                                   name="email"
                                   placeholder="you@example.com"
                                   required
                                   autocomplete="email">
                        </div>

                        <div class="form-group">
                            <label for="password">Password</label>
                            <div class="pass-wrap">
                                <input type="password"
                                       id="password"
                                       name="password"
                                       placeholder="At least 6 characters"
                                       required
                                       autocomplete="new-password"
                                       oninput="checkStrength(this.value)">
                                <span class="show-pass" onclick="togglePass('password')">👁️</span>
                            </div>
                            <div class="strength-bar">
                                <div class="strength-fill" id="strength-fill"></div>
                            </div>
                            <div class="strength-text" id="strength-text"></div>
                        </div>

                        <div class="form-group">
                            <label for="confirm_password">Confirm password</label>
                            <div class="pass-wrap">
                                <input type="password"
                                       id="confirm_password"
                                       name="confirm_password"
                                       placeholder="Repeat your password"
                                       required
                                       autocomplete="new-password">
                                <span class="show-pass" onclick="togglePass('confirm_password')">👁️</span>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary btn-full" style="margin-top:0.5rem;">
                            Create Account ✦
                        </button>

                    </form>

                    <div class="divider">
                        <hr><span>already have an account?</span><hr>
                    </div>

                    <a href="{{ url_for('login') }}"
                       class="btn btn-outline btn-full">
                        Log In Instead
                    </a>
                </div>

                <div class="auth-footer anim anim-3">
                    Join QuizForge and turn any file into a quiz or flashcard instantly 🚀
                </div>

            </div>
        </div>
    </div>

    <script>
        function togglePass(id) {
            const input = document.getElementById(id);
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        function checkStrength(val) {
            const fill = document.getElementById('strength-fill');
            const text = document.getElementById('strength-text');
            let strength = 0;
            if (val.length >= 6) strength++;
            if (val.length >= 10) strength++;
            if (/[A-Z]/.test(val)) strength++;
            if (/[0-9]/.test(val)) strength++;
            if (/[^A-Za-z0-9]/.test(val)) strength++;

            const levels = [
                { pct: '0%', color: '#e0ddff', label: '' },
                { pct: '25%', color: '#e24b4a', label: 'Weak' },
                { pct: '50%', color: '#ef9f27', label: 'Fair' },
                { pct: '75%', color: '#1d9e75', label: 'Good' },
                { pct: '100%', color: '#0f6e56', label: 'Strong 💪' },
            ];

            const level = levels[Math.min(strength, 4)];
            fill.style.width = level.pct;
            fill.style.background = level.color;
            text.textContent = level.label;
            text.style.color = level.color;
        }

        const colors = ['#7f77dd', '#1d9e75', '#534ab7', '#5dcaa5'];
        const container = document.getElementById('particles');
        for (let i = 0; i < 14; i++) {
            const p = document.createElement('div');
            p.classList.add('particle');
            const size = Math.random() * 16 + 8;
            p.style.width = size + 'px';
            p.style.height = size + 'px';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.background = colors[Math.floor(Math.random() * colors.length)];
            p.style.animationDuration = (Math.random() * 10 + 8) + 's';
            p.style.animationDelay = (Math.random() * 8) + 's';
            container.appendChild(p);
        }
    </script>
</body>
</html>
